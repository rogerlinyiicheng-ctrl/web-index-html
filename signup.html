<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Platform - Sign Up</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-center">
      <section class="card">
        <h1>Sign Up</h1>
        <form id="signupForm" autocomplete="off">
          <div class="form-group">
            <label for="signupUsername">Username</label>
            <input type="text" id="signupUsername" name="username" placeholder="Enter username" autocomplete="off" />
          </div>

          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" name="password" placeholder="Enter password" />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" />
          </div>

          <button type="submit" class="btn">Sign Up</button>
        </form>
        <p class="auth-link">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </section>
    </main>
    <script src="signup.js"></script>
  </body>
</html>
